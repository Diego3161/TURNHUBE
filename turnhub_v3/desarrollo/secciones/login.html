<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar sesión — TurnHub</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/styles.css">
</head>
<body>

  <nav class="navbar navbar-turnhub sticky-top">
    <div class="container">
      <a class="navbar-brand" href="../index.html">TurnHub</a>
      <a href="../index.html" class="nav-link" style="color: var(--color-text-muted); font-size: 0.9rem;">← Volver al inicio</a>
    </div>
  </nav>

  <main style="min-height: 90vh; display: flex; align-items: center; padding: 40px 16px;">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4">

          <!-- Tabs: Login / Registro -->
          <ul class="nav nav-pills mb-4 justify-content-center" id="authTabs" role="tablist">
            <li class="nav-item" role="presentation">
              <button class="nav-link active" id="login-tab" data-bs-toggle="pill" data-bs-target="#tab-login" type="button" role="tab"
                style="color: var(--color-text-muted); background: transparent; border: 1px solid var(--color-border); border-radius: 8px 0 0 8px; padding: 10px 24px;">
                Iniciar sesión
              </button>
            </li>
            <li class="nav-item" role="presentation">
              <button class="nav-link" id="registro-tab" data-bs-toggle="pill" data-bs-target="#tab-registro" type="button" role="tab"
                style="color: var(--color-text-muted); background: transparent; border: 1px solid var(--color-border); border-left: none; border-radius: 0 8px 8px 0; padding: 10px 24px;">
                Registrarme
              </button>
            </li>
          </ul>

          <div class="tab-content">

            <!-- LOGIN -->
            <div class="tab-pane fade show active" id="tab-login" role="tabpanel">
              <div class="auth-card">
                <h1 style="font-size: 1.3rem; font-weight: 700; text-align: center; margin-bottom: 28px;">
                  Bienvenido de vuelta
                </h1>

                <form id="form-login" novalidate>

                  <div class="mb-4">
                    <label class="label-th" for="login-mail">Mail <span style="color: var(--color-danger);">*</span></label>
                    <input type="email" id="login-mail" class="input-th" placeholder="tu@mail.com" autocomplete="email" aria-required="true">
                    <span class="error-msg" id="error-login-mail"></span>
                  </div>

                  <div class="mb-4">
                    <label class="label-th" for="login-pass">Contraseña <span style="color: var(--color-danger);">*</span></label>
                    <div style="position: relative;">
                      <input type="password" id="login-pass" class="input-th" placeholder="••••••••" autocomplete="current-password" aria-required="true" style="padding-right: 50px;">
                      <button type="button" id="toggle-pass"
                        style="position: absolute; right: 14px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; font-size: 1rem;">
                        👁
                      </button>
                    </div>
                    <span class="error-msg" id="error-login-pass"></span>
                  </div>

                  <button type="submit" class="btn btn-primary-th w-100 mb-3" style="padding: 14px; font-size: 1rem;">
                    Entrar
                  </button>

                  <div class="text-center">
                    <a href="#" style="color: var(--color-primary-light); font-size: 0.85rem; text-decoration: none;">
                      ¿Olvidaste tu contraseña?
                    </a>
                  </div>

                </form>
              </div>
            </div>

            <!-- REGISTRO -->
            <div class="tab-pane fade" id="tab-registro" role="tabpanel">
              <div class="auth-card">
                <h1 style="font-size: 1.3rem; font-weight: 700; text-align: center; margin-bottom: 8px;">
                  Registrá tu comercio
                </h1>
                <p class="text-muted-th text-center mb-4" style="font-size: 0.85rem;">Gratis. Sin tarjeta. Listo en 5 minutos.</p>

                <form id="form-registro" novalidate>

                  <div class="mb-4">
                    <label class="label-th" for="reg-nombre">Nombre del comercio <span style="color: var(--color-danger);">*</span></label>
                    <input type="text" id="reg-nombre" class="input-th" placeholder="Ej: Peluquería Marcela" aria-required="true">
                    <span class="error-msg" id="error-reg-nombre"></span>
                  </div>

                  <div class="mb-4">
                    <label class="label-th" for="reg-mail">Mail <span style="color: var(--color-danger);">*</span></label>
                    <input type="email" id="reg-mail" class="input-th" placeholder="tu@mail.com" autocomplete="email" aria-required="true">
                    <span class="error-msg" id="error-reg-mail"></span>
                  </div>

                  <div class="mb-4">
                    <label class="label-th" for="reg-pass">Contraseña <span style="color: var(--color-danger);">*</span></label>
                    <input type="password" id="reg-pass" class="input-th" placeholder="Mínimo 8 caracteres" autocomplete="new-password" aria-required="true">
                    <span class="error-msg" id="error-reg-pass"></span>
                  </div>

                  <div class="mb-4">
                    <label class="label-th" for="reg-rubro">Rubro <span style="color: var(--color-danger);">*</span></label>
                    <select id="reg-rubro" class="input-th" aria-required="true" style="cursor: pointer;">
                      <option value="">Seleccioná un rubro</option>
                      <option>Peluquería</option>
                      <option>Veterinaria</option>
                      <option>Consultorio médico</option>
                      <option>Barbería</option>
                      <option>Manicuria</option>
                      <option>Estética</option>
                      <option>Entrenamiento personal</option>
                      <option>Otro</option>
                    </select>
                    <span class="error-msg" id="error-reg-rubro"></span>
                  </div>

                  <button type="submit" class="btn btn-primary-th w-100" style="padding: 14px; font-size: 1rem;"
                    onclick="
                      event.preventDefault();
                      const n = document.getElementById('reg-nombre');
                      const m = document.getElementById('reg-mail');
                      const p = document.getElementById('reg-pass');
                      const r = document.getElementById('reg-rubro');
                      let ok = true;
                      if (!n.value.trim()) { document.getElementById('error-reg-nombre').textContent='Campo obligatorio'; document.getElementById('error-reg-nombre').classList.add('visible'); ok=false; } else { document.getElementById('error-reg-nombre').classList.remove('visible'); }
                      if (!m.value.includes('@')) { document.getElementById('error-reg-mail').textContent='Ingresá un mail válido'; document.getElementById('error-reg-mail').classList.add('visible'); ok=false; } else { document.getElementById('error-reg-mail').classList.remove('visible'); }
                      if (p.value.length < 8) { document.getElementById('error-reg-pass').textContent='Mínimo 8 caracteres'; document.getElementById('error-reg-pass').classList.add('visible'); ok=false; } else { document.getElementById('error-reg-pass').classList.remove('visible'); }
                      if (!r.value) { document.getElementById('error-reg-rubro').textContent='Seleccioná un rubro'; document.getElementById('error-reg-rubro').classList.add('visible'); ok=false; } else { document.getElementById('error-reg-rubro').classList.remove('visible'); }
                      if (ok) window.location.href='dashboard.html';
                    ">
                    Crear cuenta gratis
                  </button>

                  <p class="text-muted-th text-center mt-3" style="font-size: 0.78rem;">
                    Al registrarte aceptás los términos de uso.
                  </p>

                </form>
              </div>
            </div>

          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../assets/js/main.js"></script>
  <script>
    // Activar tab de registro si viene con #registro en la URL
    if (window.location.hash === '#registro') {
      const tab = document.getElementById('registro-tab');
      if (tab) {
        const bsTab = new bootstrap.Tab(tab);
        bsTab.show();
      }
    }

    // Estilos para el tab activo
    document.querySelectorAll('[data-bs-toggle="pill"]').forEach(function(tab) {
      tab.addEventListener('show.bs.tab', function() {
        document.querySelectorAll('[data-bs-toggle="pill"]').forEach(function(t) {
          t.style.color = 'var(--color-text-muted)';
          t.style.background = 'transparent';
        });
      });
      tab.addEventListener('shown.bs.tab', function() {
        tab.style.color = '#fff';
        tab.style.background = 'var(--color-primary)';
      });
    });
  </script>
</body>
</html>
